{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <div class="card shadow-lg border-0 mt-5">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-house-door-fill text-warning"
                           style="font-size:65px;"></i>

                        <h2 class="fw-bold mt-3">
                            Welcome Back
                        </h2>

                        <p class="text-muted">
                            Sign in to your account
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button class="btn btn-warning w-100 btn-lg">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Login

                        </button>

                    </form>

                    <hr class="my-4">

                    <div class="text-center">

                        Don't have an account?

                        <a href="{% url 'register' %}">
                            Register
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
